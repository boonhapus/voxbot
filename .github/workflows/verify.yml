name: Verify

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: "Ruff: Lint"
        run: uv run make.py lint

      - name: "Ruff: Format"
        run: uv run make.py format

      - name: "Pyrefly: Typecheck"
        run: uv run make.py typecheck

      - name: "Deptry: Dependencies"
        run: uv run make.py deps

      - name: "Pytest: Test"
        run: uv run make.py test

