[project]
name = "voxbot"
version = "0.2.0"
description = "TTS Discord bot using hikari + crescent"
readme = "README.md"
authors = [
    { name = "boonhapus", email = "me@boonhap.us" }
]
requires-python = ">=3.14"
dependencies = [
    "attrs>=25.4.0",
    "cyclopts>=4.10.2",
    "hikari>=2.5.0",
    "hikari-crescent>=1.4.0",
    "hikari-wave>=0.7.0a1",
    "mistralai>=2.4.0",
    "python-dotenv>=1.2.2",
    "structlog>=25.5.0",
]

[build-system]
requires = ["uv_build>=0.10.0,<0.11.0"]
build-backend = "uv_build"

[project.scripts]
voxbot = "voxbot.__main__:cli"

[dependency-groups]
dev = [
    "ruff>=0.15.11",
]

[tool.ruff]
target-version = "py314"
line-length = 120

[tool.ruff.format]
docstring-code-format = true
